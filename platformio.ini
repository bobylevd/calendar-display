[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.17
build_flags =
    -DUSER_SETUP_LOADED=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT7=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000

; Minimal OTA bootstrap - fits stock OTA partition (~520KB)
; Flash this first via stock firmware's /update endpoint
[env:bootstrap]
platform = espressif8266
board = esp12e
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.ldscript = eagle.flash.4m1m.ld
build_type = release
lib_deps =
    tzapu/WiFiManager@^2.0.17
build_flags =
    -Os
    -DBOOTSTRAP
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY_LOW_FLASH
    -DWM_NODEBUG
build_src_filter = +<bootstrap.cpp>

; SmallTV-Ultra hardware - ST7789 240x240
[env:esp8266]
platform = espressif8266
board = esp12e
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld
upload_speed = 921600
monitor_filters = esp8266_exception_decoder, time
build_type = release
build_flags =
    ${env.build_flags}
    -Os
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY_LOW_FLASH
    -DWM_NODEBUG
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=-1
    -DTFT_DC=0
    -DTFT_RST=2
    -DTFT_BL=5
    -DTFT_BACKLIGHT_ON=LOW
    -DTFT_RGB_ORDER=1
